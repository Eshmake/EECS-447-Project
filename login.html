<!doctype html>
<html lang="en">
<head>
  <!--page formatting-->
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - VEX Team Manager</title>
  <meta name="login" content="Login page for Vex Team Manager" />

  <!--favicons-->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
  <link rel="manifest" href="favicon_io/site.webmanifest">
  <link rel="shortcut icon" href="favicon_io/favicon.ico">
  
  <!--stylesheet-->
  <link rel="stylesheet" href="login_styles.css">
</head>

<!--page html-->
<body>
<main id="login" class="wrap">
  <section class="login-container">

    <div class="logo-header">
      <img src="images/gears2.jpg" alt="logo">
      <h1>VEX Team Manager</h1>
    </div>
    
    <h2>Login</h2>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="username">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="text" id="password">
    </div>

    <!--
    <div class="form-group">
        <label>Team</label>
        <select name="team" id="team">
            <option value=""></option>
            <option value="1">Team 1</option>
            <option value="2">Team 2</option>
        </select>
    </div>
    -->

    <button onclick="login()">Login</button>

    <div class="error" id="errorMsg"></div>

    <div class="create" style="text-align:center; margin-top:10px;">
        <label>New User?</label>
        <a href="create_account.html">Create New Account!</a>
    </div>

  </section>


  <footer>
    <div>© <span id="year">2026</span> Sina Asheghalishahi - Evan Rogerson - Cyn Tran</div>
    <div class="small">Built using HTML, CSS, and JavaScript, and hosted on GitHub Pages.</div>
  </footer>
</main>

<!--script-->
<script src="login_script.js"></script>
</body>
</html>
